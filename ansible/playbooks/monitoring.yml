---
- name: Setup monitoring VM (Prometheus + Grafana)
  hosts: monitoring
  tasks:
    - name: Create monitoring directory
      ansible.builtin.file:
        path: /opt/monitoring
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/compose/monitoring/docker-compose.yml"
        dest: /opt/monitoring/docker-compose.yml
        mode: "0644"

    - name: Create prometheus config directory
      ansible.builtin.file:
        path: /opt/monitoring/prometheus
        state: directory
        mode: "0755"

    - name: Copy prometheus.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/compose/monitoring/prometheus/prometheus.yml"
        dest: /opt/monitoring/prometheus/prometheus.yml
        mode: "0644"

    - name: Create grafana provisioning directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/monitoring/grafana/provisioning/datasources
        - /opt/monitoring/grafana/provisioning/dashboards/json

    - name: Copy grafana datasource config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/compose/monitoring/grafana/provisioning/datasources/prometheus.yml"
        dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
        mode: "0644"

    - name: Copy grafana dashboard provisioning config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/compose/monitoring/grafana/provisioning/dashboards/dashboards.yml"
        dest: /opt/monitoring/grafana/provisioning/dashboards/dashboards.yml
        mode: "0644"

    - name: Download Node Exporter Full dashboard
      ansible.builtin.get_url:
        url: https://grafana.com/api/dashboards/1860/revisions/latest/download
        dest: /opt/monitoring/grafana/provisioning/dashboards/json/node-exporter-full.json
        mode: "0644"

    - name: Start monitoring stack
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: present

    - name: Restart Grafana to load provisioning changes
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        services:
          - grafana
        state: restarted
