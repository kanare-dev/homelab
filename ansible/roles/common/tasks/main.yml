---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname | default(inventory_hostname) }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Set timezone to Asia/Tokyo
  community.general.timezone:
    name: Asia/Tokyo

- name: Configure NTP servers
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    mode: "0644"
  notify: restart systemd-timesyncd
  when: ntp_servers is defined

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
  notify: restart sshd

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
  notify: restart sshd

- name: Enable and configure UFW defaults
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Allow UFW ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from | default('any') }}"
  loop: "{{ ufw_allowed_ports | default([]) }}"

- name: Always allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
