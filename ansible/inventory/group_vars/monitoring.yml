---
# monitoring グループ変数

prometheus_port: 9090
grafana_port: 3000

prometheus_scrape_targets:
  - job_name: "node"
    targets:
      - "192.168.11.11:9100"
      - "192.168.11.13:9100"
      - "192.168.11.20:9100"
      - "192.168.11.21:9100"
  - job_name: "prometheus"
    targets:
      - "localhost:9090"

# UFW
ufw_allowed_ports:
  - { port: 22, proto: tcp }
  - { port: 3000, proto: tcp }    # Grafana
  - { port: 9090, proto: tcp }    # Prometheus
  - { port: 9100, proto: tcp }    # node_exporter
