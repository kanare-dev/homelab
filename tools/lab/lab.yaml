# homelab 監視 CLI 設定
# VM 名、サービス、チェック方法を定義

hosts:
  vm-infra:
    ip: 192.168.11.11
    services:
      - name: adguardhome
        check: tcp
        port: 53
      - name: adguardhome-ui
        check: http
        url: http://192.168.11.11:3000/
      - name: caddy
        check: tcp
        port: 443
      - name: coredns
        check: ssh
        command: dig @127.0.0.1 -p 5353 lab.kanare.dev SOA +short
      - name: unbound
        check: ssh
        command: dig @127.0.0.1 -p 5335 example.com +short
      - name: tailscale
        check: ssh
        command: tailscale status
  vm-monitoring:
    ip: 192.168.11.13
    services:
      - name: grafana
        check: http
        url: http://192.168.11.13:3000/api/health
      - name: prometheus
        check: http
        url: http://192.168.11.13:9090/-/healthy
      - name: node_exporter
        check: tcp
        port: 9100
  vm-apps:
    ip: 192.168.11.20
    services:
      - name: homepage
        check: http
        url: http://192.168.11.20:3001/
  vm-dev:
    ip: 192.168.11.21
    services:
      - name: node_exporter
        check: tcp
        port: 9100
  vm-windows:
    ip: 192.168.11.30
    services:
      - name: rdp
        check: tcp
        port: 3389
