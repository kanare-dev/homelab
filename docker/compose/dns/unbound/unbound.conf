server:
    interface: 127.0.0.1@5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # セキュリティ設定
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    prefetch: yes

    # アクセス制御（localhost のみ）
    access-control: 127.0.0.0/8 allow
